{% extends "base.html" %}

{% block content %}
<article class="post-detail">
    <header class="hero-card">
        <p class="eyebrow">Published {{ published_on }}</p>
        <h1>{{ title }}</h1>
        {% if tags.len() > 0 %}
        <div class="tag-row" aria-label="Tags">
            {% for tag in tags %}
            <a class="tag-chip" href="/tags/{{ tag.slug }}">{{ tag.name }}</a>
            {% endfor %}
        </div>
        {% endif %}
    </header>

    <section class="panel prose">
        {{ body_html|safe }}
    </section>
</article>
{% endblock %}
